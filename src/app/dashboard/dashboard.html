<div style="padding: 24px; max-width: 1200px; margin: 0 auto;">
  <div style="margin-bottom: 24px;">
    <h1 style="margin: 0; color: #3f51b5;">Dashboard Overview</h1>
    <p style="color: #666; font-size: 16px;">Welcome to the Online Course Management System.</p>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;">
    
    <!-- Courses Card -->
    <mat-card class="analytics-card">
      <mat-card-header>
        <div mat-card-avatar style="background-color: #e8eaf6; color: #3f51b5; display: flex; align-items: center; justify-content: center; border-radius: 50%;">
          <mat-icon>library_books</mat-icon>
        </div>
        <mat-card-title>Total Courses</mat-card-title>
        <mat-card-subtitle>Available in catalog</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content style="padding-top: 16px;">
        <h2 style="font-size: 48px; margin: 0; font-weight: 300; color: #3f51b5;">{{ totalCourses }}</h2>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button color="primary" (click)="viewCourses()">MANAGE COURSES</button>
      </mat-card-actions>
    </mat-card>

    <!-- Students Card -->
    <mat-card class="analytics-card">
      <mat-card-header>
        <div mat-card-avatar style="background-color: #e0f2f1; color: #009688; display: flex; align-items: center; justify-content: center; border-radius: 50%;">
          <mat-icon>people</mat-icon>
        </div>
        <mat-card-title>Registered Students</mat-card-title>
        <mat-card-subtitle>Active global users</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content style="padding-top: 16px;">
        <h2 style="font-size: 48px; margin: 0; font-weight: 300; color: #009688;">{{ totalStudents }}</h2>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button color="primary" (click)="viewStudents()">MANAGE STUDENTS</button>
      </mat-card-actions>
    </mat-card>

    <!-- Enrollments Card -->
    <mat-card class="analytics-card">
      <mat-card-header>
        <div mat-card-avatar style="background-color: #fff3e0; color: #ff9800; display: flex; align-items: center; justify-content: center; border-radius: 50%;">
          <mat-icon>school</mat-icon>
        </div>
        <mat-card-title>Total Enrollments</mat-card-title>
        <mat-card-subtitle>Across all courses</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content style="padding-top: 16px;">
        <h2 style="font-size: 48px; margin: 0; font-weight: 300; color: #ff9800;">{{ totalEnrollments }}</h2>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-button color="primary" (click)="enrollStudent()">NEW ENROLLMENT</button>
      </mat-card-actions>
    </mat-card>

  </div>
</div>
