<div style="padding: 24px; max-width: 1200px; margin: 0 auto;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h1 style="color: #3f51b5; margin: 0;">Course Catalog</h1>
    <button mat-raised-button color="primary">
      <mat-icon>add</mat-icon> Create Course
    </button>
  </div>

  <!-- Filters -->
  <mat-card style="margin-bottom: 24px; padding: 16px;">
    <div style="display: flex; gap: 16px; align-items: center;">
      <mat-form-field appearance="outline" style="flex: 1;">
        <mat-label>Search Courses</mat-label>
        <input matInput [(ngModel)]="searchTerm" placeholder="Enter term...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" style="width: 200px;">
        <mat-label>Filter By</mat-label>
        <mat-select [(ngModel)]="filterType">
          <mat-option value="title">Title</mat-option>
          <mat-option value="category">Category</mat-option>
          <mat-option value="level">Level</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </mat-card>

  <!-- Course Grid -->
  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px;">
    <mat-card *ngFor="let course of courses | courseFilter:searchTerm:filterType" 
              class="course-card" 
              [appHighlightCourse]="course.popular ?? false"
              style="display: flex; flex-direction: column;">
      
      <mat-card-header>
        <mat-card-title style="color: #3f51b5; font-size: 20px;">{{ course.title }}</mat-card-title>
        <mat-card-subtitle>{{ course.category }} • {{ course.level }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content style="flex: 1; padding-top: 16px;">
        <p style="color: #555; line-height: 1.5;">{{ course.description }}</p>
        <div style="margin-top: 16px; font-size: 14px; color: #666;">
          <div style="display: flex; align-items: center; margin-bottom: 8px;">
            <mat-icon style="font-size: 20px; width: 20px; height: 20px; margin-right: 8px;">person</mat-icon>
            {{ course.instructor }}
          </div>
          <div style="display: flex; align-items: center;" *ngIf="course.price">
            <mat-icon style="font-size: 20px; width: 20px; height: 20px; margin-right: 8px;">attach_money</mat-icon>
            {{ course.price }}
          </div>
        </div>
      </mat-card-content>

      <mat-card-actions align="end" style="padding: 16px;">
        <button mat-stroked-button color="primary" (click)="viewCourse(course.id)">VIEW DETAILS</button>
      </mat-card-actions>
    </mat-card>
  </div>
  
  <div *ngIf="(courses | courseFilter:searchTerm:filterType).length === 0" style="text-align: center; padding: 48px; color: #999;">
    <mat-icon style="font-size: 48px; width: 48px; height: 48px; margin-bottom: 16px;">search_off</mat-icon>
    <h3>No courses found matching your criteria.</h3>
  </div>
</div>
