<div style="padding: 48px; max-width: 600px; margin: 0 auto;">
  
  <mat-card>
    <mat-card-header style="background-color: #ff9800; color: white; padding: 24px; margin: -16px -16px 32px -16px; border-top-left-radius: 4px; border-top-right-radius: 4px;">
      <mat-card-title style="color: white; font-size: 24px; margin: 0; display: flex; align-items: center;">
        <mat-icon style="margin-right: 12px; font-size: 32px; width: 32px; height: 32px;">school</mat-icon> 
        Course Enrollment
      </mat-card-title>
      <mat-card-subtitle style="color: rgba(255,255,255,0.8); font-size: 16px; margin-top: 8px;">
        Register a student for a new course
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content style="padding: 0 16px;">
      <form [formGroup]="enrollmentForm" (ngSubmit)="onSubmit()" style="display: flex; flex-direction: column; gap: 24px;">
        
        <!-- Student Selection -->
        <mat-form-field appearance="outline" style="width: 100%;">
          <mat-label>Select Student</mat-label>
          <mat-select formControlName="studentId">
            <mat-option *ngFor="let student of students" [value]="student.id">
              {{ student.name }} ({{ student.email }})
            </mat-option>
          </mat-select>
          <mat-icon matSuffix color="primary">person</mat-icon>
          <mat-error *ngIf="enrollmentForm.get('studentId')?.hasError('required') && enrollmentForm.get('studentId')?.touched">
            Please select a student
          </mat-error>
        </mat-form-field>

        <!-- Course Selection -->
        <mat-form-field appearance="outline" style="width: 100%;">
          <mat-label>Select Course</mat-label>
          <mat-select formControlName="courseId">
            <mat-option *ngFor="let course of courses" [value]="course.id">
              {{ course.title }} - {{ course.level }}
            </mat-option>
          </mat-select>
          <mat-icon matSuffix color="primary">library_books</mat-icon>
          <mat-error *ngIf="enrollmentForm.get('courseId')?.hasError('required') && enrollmentForm.get('courseId')?.touched">
            Please select a course
          </mat-error>
        </mat-form-field>

        <div style="margin-top: 16px; padding-bottom: 8px;">
          <button mat-raised-button color="accent" type="submit" [disabled]="enrollmentForm.invalid" style="width: 100%; padding: 12px 0; font-size: 18px;">
            Complete Enrollment
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

</div>
